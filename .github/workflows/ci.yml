name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
      - name: Compile check
        run: python -m compileall src services
      - name: Run tests
        run: pytest -q
      - name: Build package
        run: python -m build
      - name: Twine check
        run: twine check dist/*
