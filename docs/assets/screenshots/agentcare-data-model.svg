<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1427"/>
      <stop offset="100%" stop-color="#101e37"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #e9f2ff; }
      .sub { font: 500 15px Arial, sans-serif; fill: #a4bbdf; }
      .tbl { fill: #13233f; stroke: #345b96; stroke-width: 2; rx: 14; }
      .th { font: 700 17px Arial, sans-serif; fill: #dbe9ff; }
      .tx { font: 500 14px Arial, sans-serif; fill: #a9c5ee; }
      .pk { fill: #7dd3fc; }
      .fk { fill: #86efac; }
      .arrow { stroke: #7db2ff; stroke-width: 2.5; fill: none; marker-end: url(#m); }
      .tag { font: 700 12px Arial, sans-serif; fill: #0e1a2e; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#7db2ff"/>
    </marker>
  </defs>
  <rect width="1500" height="920" fill="url(#bg)"/>
  <text x="50" y="70" class="title">AgentCare Data Model (Operational)</text>
  <text x="50" y="96" class="sub">Primary entities for call memory, appointments, and lifecycle analytics</text>

  <rect x="70" y="150" width="340" height="230" class="tbl"/>
  <text x="92" y="186" class="th">customer_profiles</text>
  <text x="92" y="218" class="tx">customer_id</text><rect x="250" y="205" width="30" height="16" rx="8" class="pk"/><text x="257" y="217" class="tag">PK</text>
  <text x="92" y="245" class="tx">name</text>
  <text x="92" y="272" class="tx">email</text>
  <text x="92" y="299" class="tx">phone_e164</text>
  <text x="92" y="326" class="tx">last_summary</text>
  <text x="92" y="353" class="tx">interaction_count</text>

  <rect x="500" y="120" width="430" height="310" class="tbl"/>
  <text x="522" y="156" class="th">call_executions</text>
  <text x="522" y="188" class="tx">execution_id</text><rect x="700" y="175" width="30" height="16" rx="8" class="pk"/><text x="707" y="187" class="tag">PK</text>
  <text x="522" y="215" class="tx">customer_id</text><rect x="700" y="202" width="30" height="16" rx="8" class="fk"/><text x="707" y="214" class="tag">FK</text>
  <text x="522" y="242" class="tx">appointment_id</text>
  <text x="522" y="269" class="tx">status</text>
  <text x="522" y="296" class="tx">patient_facing_summary</text>
  <text x="522" y="323" class="tx">internal_ops_summary</text>
  <text x="522" y="350" class="tx">extracted_data (jsonb)</text>
  <text x="522" y="377" class="tx">created_at / updated_at</text>

  <rect x="1010" y="170" width="380" height="230" class="tbl"/>
  <text x="1032" y="206" class="th">appointments</text>
  <text x="1032" y="238" class="tx">appointment_id</text><rect x="1210" y="225" width="30" height="16" rx="8" class="pk"/><text x="1217" y="237" class="tag">PK</text>
  <text x="1032" y="265" class="tx">customer_id</text><rect x="1210" y="252" width="30" height="16" rx="8" class="fk"/><text x="1217" y="264" class="tag">FK</text>
  <text x="1032" y="292" class="tx">slot_start</text>
  <text x="1032" y="319" class="tx">status</text>
  <text x="1032" y="346" class="tx">source_execution_id</text>

  <rect x="500" y="500" width="430" height="260" class="tbl"/>
  <text x="522" y="536" class="th">call_lifecycle_events</text>
  <text x="522" y="568" class="tx">event_id</text><rect x="700" y="555" width="30" height="16" rx="8" class="pk"/><text x="707" y="567" class="tag">PK</text>
  <text x="522" y="595" class="tx">execution_id</text><rect x="700" y="582" width="30" height="16" rx="8" class="fk"/><text x="707" y="594" class="tag">FK</text>
  <text x="522" y="622" class="tx">state</text>
  <text x="522" y="649" class="tx">status</text>
  <text x="522" y="676" class="tx">details (jsonb)</text>
  <text x="522" y="703" class="tx">ts</text>

  <path d="M410,245 L500,245" class="arrow"/>
  <path d="M930,260 L1010,260" class="arrow"/>
  <path d="M715,430 L715,500" class="arrow"/>
  <text x="432" y="232" class="sub">1-to-many</text>
  <text x="940" y="247" class="sub">optional booking link</text>
  <text x="734" y="474" class="sub">lifecycle timeline</text>
</svg>
