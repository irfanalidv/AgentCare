<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" font-family="-apple-system, 'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="triggerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h1 { font-size: 44px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .tag { font-size: 17px; fill: #6b7d99; font-weight: 400; }
      .col { font-size: 22px; font-weight: 700; fill: #e6f2ff; }
      .card { fill: #0f2233; stroke: #1f3850; stroke-width: 1.5; rx: 14; }
      .cardLabel { font-size: 17px; font-weight: 600; fill: #e6f2ff; }
      .archBox { fill: transparent; stroke: #10b981; stroke-width: 2; rx: 12; }
      .archLabel { font-size: 17px; font-weight: 600; fill: #e6f2ff; }
      .pill { fill: #1a3247; stroke: #2a4660; stroke-width: 1; rx: 14; }
      .pillText { font-size: 13px; fill: #b8d4f0; font-weight: 500; }
      .arrow { stroke: #10b981; stroke-width: 2; fill: none; }
      .orch { fill: url(#orchGrad); rx: 12; }
      .orchText { font-size: 19px; font-weight: 700; fill: #ffffff; }
      .step { fill: #0f2233; stroke: #10b981; stroke-width: 1.8; rx: 22; }
      .stepText { font-size: 14px; fill: #b8e6d6; font-weight: 600; }
      .stepActive { fill: url(#triggerGrad); stroke: #10b981; stroke-width: 1.8; rx: 22; }
      .stepActiveText { font-size: 14px; fill: #ffffff; font-weight: 700; }
      .infoCard { fill: #0f2233; stroke: #1f3850; stroke-width: 1.5; rx: 12; }
      .infoLabel { font-size: 17px; font-weight: 700; fill: #ffffff; }
      .smallPill { fill: #1a3247; stroke: #2a4660; stroke-width: 1; rx: 11; }
      .smallPillText { font-size: 12px; fill: #b8d4f0; font-weight: 500; }
      .codeFont { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; fill: #b8e6d6; }
      .badge { fill: #1a3247; stroke: #2a4660; stroke-width: 1; rx: 14; }
      .badgeText { font-size: 12px; fill: #e6f2ff; font-weight: 600; }
      .badgePython { fill: #ffd43b; rx: 14; }
      .badgePythonText { font-size: 12px; fill: #1e3a5f; font-weight: 700; }
      .badgeFastAPI { fill: #059669; rx: 14; }
      .badgeFastAPIText { font-size: 12px; fill: #ffffff; font-weight: 700; }
    </style>
  </defs>

  <rect width="1500" height="820" fill="url(#bg)"/>

  <!-- ============ Title ============ -->
  <text x="50" y="62" class="h1">AgentCare Framework</text>
  <text x="50" y="92" class="tag">Voice AI orchestration · Healthcare + Workplace Wellness</text>

  <!-- ============ Top right badges (properly contained) ============ -->
  <!-- Open Source -->
  <rect x="1100" y="36" width="115" height="30" class="badge"/>
  <circle cx="1118" cy="51" r="5" fill="#ffffff"/>
  <text x="1130" y="55" class="badgeText">Open Source</text>
  <!-- Python -->
  <rect x="1225" y="36" width="76" height="30" class="badgePython"/>
  <circle cx="1240" cy="51" r="6" fill="#3776ab"/>
  <circle cx="1241" cy="49" r="2.5" fill="#ffd43b"/>
  <text x="1253" y="55" class="badgePythonText">Python</text>
  <!-- FastAPI -->
  <rect x="1311" y="36" width="86" height="30" class="badgeFastAPI"/>
  <path d="M 1325 44 L 1320 53 L 1326 53 L 1322 60 L 1331 51 L 1326 51 L 1330 44 Z" fill="#ffffff"/>
  <text x="1338" y="55" class="badgeFastAPIText">FastAPI</text>

  <!-- ============ Column titles ============ -->
  <text x="50" y="148" class="col">Use Cases</text>
  <text x="380" y="148" class="col">Architecture</text>
  <text x="1050" y="148" class="col">End-to-End (E2E) workflow</text>

  <!-- ============================================ -->
  <!-- USE CASES (left column, 6 cards)             -->
  <!-- ============================================ -->

  <!-- 1. New appointment booking -->
  <rect x="50" y="170" width="290" height="80" class="card"/>
  <g transform="translate(70, 195)">
    <rect x="0" y="3" width="32" height="29" rx="4" fill="none" stroke="#5dd4b3" stroke-width="1.8"/>
    <line x1="0" y1="11" x2="32" y2="11" stroke="#5dd4b3" stroke-width="1.8"/>
    <rect x="8" y="0" width="2" height="6" fill="#5dd4b3"/>
    <rect x="22" y="0" width="2" height="6" fill="#5dd4b3"/>
    <rect x="6" y="16" width="6" height="5" fill="#5dd4b3"/>
    <rect x="14" y="16" width="6" height="5" fill="#5dd4b3"/>
    <rect x="22" y="16" width="6" height="5" fill="#5dd4b3"/>
    <rect x="6" y="24" width="6" height="5" fill="#5dd4b3"/>
  </g>
  <text x="120" y="203" class="cardLabel">New appointment</text>
  <text x="120" y="226" class="cardLabel">booking</text>

  <!-- 2. Reschedule/cancel -->
  <rect x="50" y="262" width="290" height="80" class="card"/>
  <g transform="translate(70, 287)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#5dd4b3" stroke-width="1.8"/>
    <line x1="16" y1="16" x2="16" y2="8" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="22" y2="20" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <path d="M 24 24 L 30 30" stroke="#5dd4b3" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 27 30 L 30 30 L 30 27" stroke="#5dd4b3" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>
  <text x="120" y="310" class="cardLabel">Reschedule/cancel</text>

  <!-- 3. Follow-up outreach -->
  <rect x="50" y="354" width="290" height="80" class="card"/>
  <g transform="translate(70, 379)">
    <path d="M 4 12 L 4 22 L 11 22 L 22 28 L 22 6 L 11 12 Z" fill="none" stroke="#5dd4b3" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M 26 10 Q 30 17 26 24" fill="none" stroke="#5dd4b3" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 30 6 Q 36 17 30 28" fill="none" stroke="#5dd4b3" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="120" y="402" class="cardLabel">Follow-up outreach</text>

  <!-- 4. Care navigation -->
  <rect x="50" y="446" width="290" height="80" class="card"/>
  <g transform="translate(70, 471)">
    <path d="M 16 0 C 8 0 4 5 4 12 C 4 21 16 32 16 32 C 16 32 28 21 28 12 C 28 5 24 0 16 0 Z" fill="none" stroke="#5dd4b3" stroke-width="1.8" stroke-linejoin="round"/>
    <line x1="16" y1="8" x2="16" y2="16" stroke="#5dd4b3" stroke-width="2"/>
    <line x1="12" y1="12" x2="20" y2="12" stroke="#5dd4b3" stroke-width="2"/>
  </g>
  <text x="120" y="494" class="cardLabel">Care navigation</text>

  <!-- 5. Wellness check-in (highlighted) -->
  <rect x="50" y="538" width="290" height="80" class="card" stroke="#10b981" stroke-width="2"/>
  <g transform="translate(70, 562)">
    <path d="M 16 30 C 16 30 4 22 4 12 C 4 7 7 3 11 3 C 13 3 15 4 16 6 C 17 4 19 3 21 3 C 25 3 28 7 28 12 C 28 22 16 30 16 30 Z" fill="none" stroke="#5dd4b3" stroke-width="1.8" stroke-linejoin="round"/>
    <polyline points="6,15 11,15 13,11 15,19 17,13 21,15 26,15" fill="none" stroke="#5dd4b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="120" y="571" class="cardLabel">Wellness check-in</text>
  <text x="120" y="595" font-size="11" font-weight="700" fill="#10b981">NEW · v0.2.0</text>

  <!-- 6. Ops monitoring -->
  <rect x="50" y="630" width="290" height="80" class="card"/>
  <g transform="translate(70, 655)">
    <rect x="0" y="0" width="28" height="22" rx="3" fill="none" stroke="#5dd4b3" stroke-width="1.8"/>
    <line x1="6" y1="17" x2="6" y2="13" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12" y2="7" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="17" x2="18" y2="11" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="17" x2="24" y2="5" stroke="#5dd4b3" stroke-width="2" stroke-linecap="round"/>
    <circle cx="28" cy="22" r="4.5" fill="none" stroke="#5dd4b3" stroke-width="1.6"/>
    <line x1="31" y1="25" x2="34" y2="28" stroke="#5dd4b3" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="120" y="679" class="cardLabel">Ops monitoring</text>

  <!-- ============================================ -->
  <!-- ARCHITECTURE (middle column)                 -->
  <!-- Box: x=380, width=620, ends at x=1000        -->
  <!-- ============================================ -->

  <!-- Channels -->
  <rect x="380" y="170" width="620" height="56" class="archBox"/>
  <text x="402" y="204" class="archLabel">Channels</text>
  <rect x="510" y="184" width="68" height="28" class="pill"/>
  <text x="544" y="202" class="pillText" text-anchor="middle">Phone</text>
  <rect x="586" y="184" width="92" height="28" class="pill"/>
  <text x="632" y="202" class="pillText" text-anchor="middle">Dashboard</text>
  <rect x="686" y="184" width="84" height="28" class="pill"/>
  <text x="728" y="202" class="pillText" text-anchor="middle">Webhooks</text>
  <!-- Phone icon, well within the box now -->
  <g transform="translate(950, 188)">
    <path d="M 6 4 L 10 4 L 13 10 L 11 12 Q 13 17 18 19 L 20 17 L 26 20 L 26 24 Q 26 26 24 26 Q 12 26 4 14 Q 4 4 6 4 Z" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <line x1="690" y1="226" x2="690" y2="252" class="arrow"/>
  <polygon points="690,258 686,250 694,250" fill="#10b981"/>

  <!-- Orchestrator -->
  <rect x="380" y="258" width="620" height="56" class="orch"/>
  <text x="690" y="293" class="orchText" text-anchor="middle">Orchestrator / Policies / Templates</text>

  <line x1="690" y1="314" x2="690" y2="340" class="arrow"/>
  <polygon points="690,346 686,338 694,338" fill="#10b981"/>

  <!-- Integrations - brand wordmarks in their colors -->
  <rect x="380" y="346" width="620" height="56" class="archBox"/>
  <text x="402" y="380" class="archLabel">Integrations</text>
  <!-- Bolna - blue brand color, bold wordmark -->
  <rect x="525" y="358" width="92" height="32" class="pill"/>
  <text x="571" y="380" font-size="15" font-weight="700" fill="#3b82f6" text-anchor="middle">Bolna</text>
  <!-- Cal.com - black/dark on white background pill (Cal.com brand is black) -->
  <rect x="625" y="358" width="98" height="32" rx="14" fill="#ffffff" stroke="#2a4660" stroke-width="1"/>
  <text x="674" y="380" font-size="15" font-weight="700" fill="#0f0f0f" text-anchor="middle">Cal.com</text>
  <!-- Resend - white wordmark, black background pill (Resend brand is monochrome) -->
  <rect x="731" y="358" width="92" height="32" rx="14" fill="#000000" stroke="#2a4660" stroke-width="1"/>
  <text x="777" y="380" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Resend</text>
  <!-- Mistral - orange brand color -->
  <rect x="831" y="358" width="92" height="32" class="pill"/>
  <text x="877" y="380" font-size="15" font-weight="700" fill="#ff7000" text-anchor="middle">Mistral</text>

  <line x1="690" y1="402" x2="690" y2="428" class="arrow"/>
  <polygon points="690,434 686,426 694,426" fill="#10b981"/>

  <!-- Data -->
  <rect x="380" y="434" width="620" height="56" class="archBox"/>
  <text x="402" y="468" class="archLabel">Data</text>
  <rect x="595" y="448" width="100" height="28" class="pill"/>
  <circle cx="612" cy="462" r="6" fill="#336791"/>
  <text x="651" y="466" class="pillText" text-anchor="middle">Postgres</text>
  <rect x="703" y="448" width="120" height="28" class="pill"/>
  <text x="763" y="466" class="pillText" text-anchor="middle">JSON fallbacks</text>
  <!-- Database icon at right -->
  <g transform="translate(950, 446)">
    <ellipse cx="14" cy="6" rx="12" ry="4" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M 2 6 L 2 22 Q 2 26 14 26 Q 26 26 26 22 L 26 6" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M 2 14 Q 2 18 14 18 Q 26 18 26 14" fill="none" stroke="#10b981" stroke-width="2"/>
  </g>

  <line x1="690" y1="490" x2="690" y2="516" class="arrow"/>
  <polygon points="690,522 686,514 694,514" fill="#10b981"/>

  <!-- Services -->
  <rect x="380" y="522" width="620" height="56" class="archBox"/>
  <text x="402" y="556" class="archLabel">Services</text>
  <rect x="510" y="536" width="92" height="28" class="pill"/>
  <text x="556" y="554" class="pillText" text-anchor="middle">Dashboard</text>
  <rect x="610" y="536" width="80" height="28" class="pill"/>
  <text x="650" y="554" class="pillText" text-anchor="middle">Analytics</text>
  <rect x="698" y="536" width="84" height="28" class="pill"/>
  <text x="740" y="554" class="pillText" text-anchor="middle">Mock EHR</text>
  <rect x="790" y="536" width="100" height="28" class="pill"/>
  <text x="840" y="554" class="pillText" text-anchor="middle">LLM Gateway</text>

  <!-- ============================================ -->
  <!-- E2E WORKFLOW (right column, zigzag)          -->
  <!-- Column starts at x=1050, ends at x=1450      -->
  <!-- ============================================ -->

  <!-- Step 1: Trigger call (active/highlighted) -->
  <rect x="1050" y="180" width="170" height="44" class="stepActive"/>
  <text x="1135" y="208" class="stepActiveText" text-anchor="middle">1. Trigger call</text>

  <!-- arrow 1 -> 2 -->
  <path d="M 1220 202 Q 1270 202 1270 244" class="arrow"/>
  <polygon points="1270,250 1266,242 1274,242" fill="#10b981"/>

  <!-- Step 2: Transcript -->
  <rect x="1240" y="232" width="170" height="44" class="step"/>
  <text x="1325" y="260" class="stepText" text-anchor="middle">2. Transcript</text>

  <!-- arrow 2 -> 3 -->
  <path d="M 1240 254 Q 1190 254 1190 296" class="arrow"/>
  <polygon points="1190,302 1186,294 1194,294" fill="#10b981"/>

  <!-- Step 3: Extract intent -->
  <rect x="1050" y="284" width="170" height="44" class="step"/>
  <text x="1135" y="312" class="stepText" text-anchor="middle">3. Extract intent</text>

  <!-- arrow 3 -> 4 -->
  <path d="M 1220 306 Q 1270 306 1270 348" class="arrow"/>
  <polygon points="1270,354 1266,346 1274,346" fill="#10b981"/>

  <!-- Step 4: Policy -->
  <rect x="1240" y="336" width="170" height="44" class="step"/>
  <text x="1325" y="364" class="stepText" text-anchor="middle">4. Policy</text>

  <!-- arrow 4 -> 5 -->
  <path d="M 1240 358 Q 1190 358 1190 400" class="arrow"/>
  <polygon points="1190,406 1186,398 1194,398" fill="#10b981"/>

  <!-- Step 5: Book slot -->
  <rect x="1050" y="388" width="170" height="44" class="step"/>
  <text x="1135" y="416" class="stepText" text-anchor="middle">5. Book slot</text>

  <!-- arrow 5 -> 6 -->
  <path d="M 1220 410 Q 1270 410 1270 452" class="arrow"/>
  <polygon points="1270,458 1266,450 1274,450" fill="#10b981"/>

  <!-- Step 6: Email -->
  <rect x="1240" y="440" width="170" height="44" class="step"/>
  <text x="1325" y="468" class="stepText" text-anchor="middle">6. Email</text>

  <!-- arrow 6 -> 7 -->
  <path d="M 1240 462 Q 1190 462 1190 504" class="arrow"/>
  <polygon points="1190,510 1186,502 1194,502" fill="#10b981"/>

  <!-- Step 7: Persist -->
  <rect x="1050" y="492" width="170" height="44" class="step"/>
  <text x="1135" y="520" class="stepText" text-anchor="middle">7. Persist</text>

  <!-- arrow 7 -> 8 -->
  <path d="M 1220 514 Q 1270 514 1270 556" class="arrow"/>
  <polygon points="1270,562 1266,554 1274,554" fill="#10b981"/>

  <!-- Step 8: Dashboard -->
  <rect x="1240" y="544" width="170" height="44" class="step"/>
  <text x="1325" y="572" class="stepText" text-anchor="middle">8. Dashboard</text>

  <!-- ============================================ -->
  <!-- BOTTOM CARDS                                 -->
  <!-- ============================================ -->

  <!-- Reliability -->
  <rect x="380" y="630" width="280" height="100" class="infoCard"/>
  <text x="400" y="664" class="infoLabel">Reliability</text>
  <g transform="translate(610, 646)">
    <path d="M 4 4 L 8 4 L 11 9 L 9 11 Q 11 15 15 17 L 17 15 L 22 17 L 22 21 Q 22 22 21 22 Q 11 22 4 12 Q 4 4 4 4 Z" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <rect x="400" y="682" width="68" height="24" class="smallPill"/>
  <text x="434" y="698" class="smallPillText" text-anchor="middle">timeouts</text>
  <rect x="476" y="682" width="58" height="24" class="smallPill"/>
  <text x="505" y="698" class="smallPillText" text-anchor="middle">async</text>
  <rect x="542" y="682" width="68" height="24" class="smallPill"/>
  <text x="576" y="698" class="smallPillText" text-anchor="middle">fallbacks</text>

  <!-- Operator view -->
  <rect x="680" y="630" width="280" height="100" class="infoCard"/>
  <text x="700" y="664" class="infoLabel">Operator view</text>
  <g transform="translate(916, 650)">
    <rect x="0" y="0" width="22" height="14" rx="2" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M 0 1 L 11 9 L 22 1" fill="none" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="700" y="682" width="48" height="24" class="smallPill"/>
  <text x="724" y="698" class="smallPillText" text-anchor="middle">email</text>
  <rect x="756" y="682" width="86" height="24" class="smallPill"/>
  <text x="799" y="698" class="smallPillText" text-anchor="middle">booking_id</text>
  <rect x="850" y="682" width="100" height="24" class="smallPill"/>
  <text x="900" y="698" class="smallPillText" text-anchor="middle">delivery_status</text>

  <!-- Quick Start -->
  <rect x="980" y="630" width="430" height="100" class="infoCard"/>
  <text x="1000" y="664" class="infoLabel">Quick Start</text>
  <text x="1000" y="690" class="codeFont">$ pip install agentcare</text>
  <text x="1000" y="712" class="codeFont">$ python -m agentcare up</text>

</svg>
