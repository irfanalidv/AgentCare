<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" font-family="-apple-system, 'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h1 { font-size: 28px; font-weight: 800; fill: #ffffff; letter-spacing: -0.3px; }
      .tag { font-size: 13px; fill: #6b7d99; }
      .panel { fill: #0f2233; stroke: #1f3850; stroke-width: 1.5; rx: 12; }
      .panelTitle { font-size: 15px; font-weight: 700; fill: #ffffff; }
      .panelSub { font-size: 11px; fill: #6b7d99; }
      .label { font-size: 11px; fill: #6b7d99; font-weight: 600; letter-spacing: 0.5px; }
      .input { fill: #1a3247; stroke: #2a4660; stroke-width: 1; rx: 8; }
      .inputText { font-size: 13px; fill: #e6f2ff; }
      .button { fill: url(#accentGrad); rx: 8; }
      .buttonText { font-size: 13px; font-weight: 700; fill: #ffffff; }
      .pill { rx: 11; }
      .pillSuccess { fill: rgba(16, 185, 129, 0.15); stroke: #10b981; stroke-width: 1; rx: 11; }
      .pillSuccessText { font-size: 11px; fill: #10b981; font-weight: 700; }
      .pillWarn { fill: rgba(245, 158, 11, 0.15); stroke: #f59e0b; stroke-width: 1; rx: 11; }
      .pillWarnText { font-size: 11px; fill: #f59e0b; font-weight: 700; }
      .pillNeutral { fill: #1a3247; stroke: #2a4660; stroke-width: 1; rx: 11; }
      .pillNeutralText { font-size: 11px; fill: #b8d4f0; font-weight: 600; }
      .row { stroke: #1f3850; stroke-width: 1; }
      .col { font-size: 11px; fill: #6b7d99; font-weight: 700; letter-spacing: 0.5px; }
      .cell { font-size: 12px; fill: #e6f2ff; }
      .cellMuted { font-size: 12px; fill: #b8d4f0; }
      .cellMono { font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px; fill: #b8d4f0; }
      .green { fill: #10b981; }
      .pulse { fill: #10b981; }
      .nav { fill: #0f2233; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="url(#bg)"/>

  <!-- Top header bar -->
  <rect x="0" y="0" width="1500" height="68" class="nav" stroke="#1f3850" stroke-width="1"/>
  <text x="40" y="42" class="h1">AgentCare</text>
  <text x="220" y="44" font-size="14" fill="#10b981" font-weight="700">Operations Dashboard</text>
  <text x="1180" y="42" font-size="12" fill="#6b7d99">v0.2.0 · sample data only</text>
  <circle cx="1410" cy="38" r="6" class="pulse"/>
  <text x="1424" y="42" font-size="12" fill="#10b981" font-weight="600">live</text>

  <!-- ============ Row 1: Call Console + Workflow Status ============ -->

  <!-- Call Console (left, wider) -->
  <rect x="40" y="92" width="900" height="160" class="panel"/>
  <text x="60" y="120" class="panelTitle">Call Console</text>
  <text x="60" y="138" class="panelSub">Place outbound calls and monitor lifecycle</text>

  <text x="60" y="168" class="label">PHONE NUMBER (E.164)</text>
  <rect x="60" y="176" width="280" height="36" class="input"/>
  <text x="76" y="200" class="inputText">+1XXXXXXXX67</text>

  <text x="358" y="168" class="label">CUSTOMER NAME</text>
  <rect x="358" y="176" width="280" height="36" class="input"/>
  <text x="374" y="200" class="inputText">Irfan</text>

  <rect x="668" y="176" width="120" height="36" class="button"/>
  <text x="728" y="200" class="buttonText" text-anchor="middle">Call Now</text>

  <rect x="60" y="222" width="68" height="22" class="pillSuccess"/>
  <text x="94" y="237" class="pillSuccessText" text-anchor="middle">Ready</text>
  <text x="146" y="237" class="cellMuted">lifecycle:</text>
  <text x="208" y="237" class="cellMono">—</text>
  <text x="248" y="237" class="cellMuted">execution_id:</text>
  <text x="334" y="237" class="cellMono">sample</text>

  <!-- Workflow Status (right) -->
  <rect x="960" y="92" width="500" height="160" class="panel"/>
  <text x="980" y="120" class="panelTitle">Workflow Status</text>
  <text x="980" y="138" class="panelSub">Health of background services</text>

  <text x="980" y="168" class="col">SERVICE</text>
  <text x="1180" y="168" class="col">STATUS</text>
  <text x="1300" y="168" class="col">HTTP</text>

  <line x1="980" y1="178" x2="1440" y2="178" class="row"/>

  <text x="980" y="198" class="cell">llm_gateway</text>
  <rect x="1180" y="186" width="38" height="18" class="pillSuccess"/>
  <text x="1199" y="199" class="pillSuccessText" text-anchor="middle">ok</text>
  <text x="1300" y="198" class="cellMono">200</text>

  <text x="980" y="218" class="cell">mock_ehr</text>
  <rect x="1180" y="206" width="38" height="18" class="pillSuccess"/>
  <text x="1199" y="219" class="pillSuccessText" text-anchor="middle">ok</text>
  <text x="1300" y="218" class="cellMono">200</text>

  <text x="980" y="238" class="cell">webhooks</text>
  <rect x="1180" y="226" width="38" height="18" class="pillSuccess"/>
  <text x="1199" y="239" class="pillSuccessText" text-anchor="middle">ok</text>
  <text x="1300" y="238" class="cellMono">200</text>

  <text x="980" y="258" class="cell">analytics</text>
  <rect x="1180" y="246" width="38" height="18" class="pillSuccess"/>
  <text x="1199" y="259" class="pillSuccessText" text-anchor="middle">ok</text>
  <text x="1300" y="258" class="cellMono">200</text>

  <!-- ============ Row 2: Operational Case Queue ============ -->
  <rect x="40" y="272" width="1420" height="160" class="panel"/>
  <text x="60" y="300" class="panelTitle">Operational Case Queue</text>
  <text x="60" y="318" class="panelSub">Cases: 4  ·  Urgent triage: 1  ·  Review: 2  ·  Need email: 0  ·  Ready to book: 1  ·  Confirmed: 0</text>

  <text x="60" y="350" class="col">PATIENT</text>
  <text x="220" y="350" class="col">SEGMENT</text>
  <text x="320" y="350" class="col">RISK</text>
  <text x="400" y="350" class="col">STATUS</text>
  <text x="540" y="350" class="col">SLOT</text>
  <text x="780" y="350" class="col">PURPOSE</text>
  <text x="1080" y="350" class="col">DOCTOR</text>
  <text x="1280" y="350" class="col">NEXT ACTION</text>

  <line x1="60" y1="360" x2="1440" y2="360" class="row"/>

  <text x="60" y="384" class="cell">+1XXX...67 · Sample</text>
  <text x="220" y="384" class="cellMuted">repeat</text>
  <rect x="320" y="372" width="46" height="18" class="pillWarn"/>
  <text x="343" y="385" class="pillWarnText" text-anchor="middle">medium</text>
  <text x="400" y="384" class="cellMuted">rescheduled</text>
  <text x="540" y="384" class="cellMono">Sun, 08 Mar 2026, 8:00 PM IST</text>
  <text x="780" y="384" class="cellMuted">pain in neck, sleep issues</text>
  <text x="1080" y="384" class="cellMuted">Dr. Kavya Rao (Psych.)</text>
  <text x="1280" y="384" class="cellMuted">human_review</text>

  <line x1="60" y1="400" x2="1440" y2="400" class="row"/>

  <text x="60" y="418" class="cell">+1XXX...12 · Jordan</text>
  <text x="220" y="418" class="cellMuted">new</text>
  <rect x="320" y="406" width="36" height="18" class="pillSuccess"/>
  <text x="338" y="419" class="pillSuccessText" text-anchor="middle">low</text>
  <text x="400" y="418" class="cellMuted">extracted</text>
  <text x="540" y="418" class="cellMono">Tue, 10 Mar 2026, 2:30 PM IST</text>
  <text x="780" y="418" class="cellMuted">routine consultation</text>
  <text x="1080" y="418" class="cellMuted">Dr. M. Sharma (GP)</text>
  <text x="1280" y="418" class="cellMuted">ready_to_book</text>

  <!-- ============ Row 3: Recent Executions + Call Detail ============ -->

  <!-- Recent Executions (left) -->
  <rect x="40" y="452" width="900" height="280" class="panel"/>
