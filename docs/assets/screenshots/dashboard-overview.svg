  <text x="1280" y="812" class="tableh">SEGMENT</text>
  <text x="1360" y="812" class="tableh">SLOT</text>
  <text x="1058" y="836" class="tablev">-</text><text x="1145" y="836" class="tablev">needs_scheduling</text><text x="1220" y="836" class="tablev">Sample Patient</text><text x="1280" y="836" class="tablev">repeat</text><text x="1360" y="836" class="tablev">Sun 3:00 pm IST</text>
  <text x="1058" y="860" class="tablev">appt_987654</text><text x="1145" y="860" class="tablev">completed</text><text x="1220" y="860" class="tablev">Sample Patient</text><text x="1280" y="860" class="tablev">repeat</text><text x="1360" y="860" class="tablev">Sun 8:00 pm IST</text>
