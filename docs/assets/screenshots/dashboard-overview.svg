  <text x="60" y="757" class="tablev">exec_f1b8d3e4</text><text x="370" y="757" class="tablev">completed</text><text x="450" y="757" class="tablev">+1XXXXXXXX67</text><text x="580" y="757" class="tablev">0.0</text><text x="670" y="757" class="tablev">38.550</text><text x="760" y="757" class="tablev">2026-03-06T19:38:18Z</text>
  <text x="60" y="780" class="tablev">exec_g6e1c7a9</text><text x="370" y="780" class="tablev">completed</text><text x="450" y="780" class="tablev">+1XXXXXXXX67</text><text x="580" y="780" class="tablev">0.0</text><text x="670" y="780" class="tablev">26.340</text><text x="760" y="780" class="tablev">2026-03-06T19:16:24Z</text>
  <text x="60" y="803" class="tablev">exec_h9a4b2d5</text><text x="370" y="803" class="tablev">completed</text><text x="450" y="803" class="tablev">+1XXXXXXXX67</text><text x="580" y="803" class="tablev">0.0</text><text x="670" y="803" class="tablev">4.520</text><text x="760" y="803" class="tablev">2026-03-06T19:15:04Z</text>

  <!-- Right side: Call Detail and Appointments -->
  <rect x="1024" y="532" width="550" height="176" class="card"/>
  <text x="1046" y="564" class="h">Call Detail</text>
  <text x="1046" y="586" class="muted">Click any row to inspect patient/internal summaries.</text>
  <rect x="1046" y="596" width="242" height="84" class="in"/>
  <text x="1058" y="615" class="tableh">Patient-Facing Summary</text>
  <text x="1058" y="640" class="tablev">Not available</text>
  <rect x="1306" y="596" width="246" height="84" class="in"/>
