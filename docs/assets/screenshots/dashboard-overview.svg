<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f1f"/>
      <stop offset="100%" stop-color="#121d33"/>
    </linearGradient>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #ebf2ff; }
      .sub { font: 500 16px Arial, sans-serif; fill: #9eb3d9; }
      .h { font: 700 20px Arial, sans-serif; fill: #d9e8ff; }
      .txt { font: 500 14px Arial, sans-serif; fill: #a9bee1; }
      .muted { font: 500 13px Arial, sans-serif; fill: #7f97bf; }
      .tableh { font: 700 12px Arial, sans-serif; fill: #95afd9; }
      .tablev { font: 500 12px Arial, sans-serif; fill: #d4e4ff; }
      .ok { fill: #1fb874; }
      .warn { fill: #e0a22f; }
      .chipText { font: 700 11px Arial, sans-serif; fill: #0c1322; }
      .card { fill: #101c33; stroke: #243a62; stroke-width: 1.5; rx: 14; }
      .in { fill: #0c1629; stroke: #1f3257; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="26" y="18" width="1548" height="80" class="card"/>
  <text x="52" y="64" class="title">AgentCare Platform</text>
  <text x="390" y="64" class="h">Call Console</text>
  <text x="52" y="88" class="sub">Patient communication, appointment orchestration, and operations visibility in one dashboard.</text>
  <text x="52" y="106" class="muted">Sample data only (anonymized).</text>
  <circle cx="1516" cy="57" r="9" class="ok"/>

  <!-- Row 1: Call panel + workflow status -->
  <rect x="26" y="114" width="760" height="170" class="card"/>
  <text x="48" y="145" class="h">Call A Number</text>
  <text x="48" y="168" class="muted">Phone Number (E.164)</text>
  <rect x="48" y="178" width="280" height="34" class="in"/>
  <text x="60" y="200" class="txt">+1XXXXXXXX67</text>
  <text x="350" y="168" class="muted">Customer Name (optional)</text>
  <rect x="350" y="178" width="220" height="34" class="in"/>
  <text x="362" y="200" class="txt">Irfan</text>
  <rect x="590" y="178" width="120" height="34" rx="10" fill="#2563eb"/>
  <text x="624" y="200" font-size="13" font-family="Arial, sans-serif" font-weight="700" fill="#eef5ff">Call Now</text>
  <rect x="48" y="232" width="90" height="24" rx="12" fill="#1fb874"/>
  <text x="75" y="249" class="chipText">Ready</text>
  <text x="160" y="248" class="txt">lifecycle: -</text>
  <text x="260" y="248" class="txt">execution_id: sample</text>

  <rect x="804" y="114" width="770" height="170" class="card"/>
  <text x="826" y="145" class="h">Workflow Status</text>
  <rect x="826" y="157" width="728" height="110" class="in"/>
  <text x="846" y="183" class="tableh">SERVICE</text>
  <text x="1020" y="183" class="tableh">STATUS</text>
  <text x="1115" y="183" class="tableh">CODE</text>
  <text x="846" y="208" class="tablev">llm_gateway</text><text x="1020" y="208" class="tablev">ok</text><text x="1115" y="208" class="tablev">200</text>
  <text x="846" y="229" class="tablev">mock_ehr</text><text x="1020" y="229" class="tablev">ok</text><text x="1115" y="229" class="tablev">200</text>
  <text x="846" y="250" class="tablev">webhooks</text><text x="1020" y="250" class="tablev">ok</text><text x="1115" y="250" class="tablev">200</text>
  <text x="846" y="271" class="tablev">analytics</text><text x="1020" y="271" class="tablev">ok</text><text x="1115" y="271" class="tablev">200</text>

  <!-- Row 2: Operational Case Queue -->
  <rect x="26" y="304" width="1548" height="208" class="card"/>
  <text x="48" y="336" class="h">Operational Case Queue</text>
  <text x="48" y="360" class="txt">Cases: 1 | Urgent Triage: 0 | Review: 1 | Need Email: 0 | Ready to Book: 0 | Confirmed: 0</text>
  <rect x="48" y="372" width="1504" height="124" class="in"/>
  <text x="60" y="392" class="tableh">PATIENT</text>
  <text x="250" y="392" class="tableh">SEGMENT</text>
  <text x="340" y="392" class="tableh">CATEGORY</text>
  <text x="430" y="392" class="tableh">RISK</text>
  <text x="505" y="392" class="tableh">STATUS</text>
  <text x="610" y="392" class="tableh">SLOT</text>
  <text x="840" y="392" class="tableh">PURPOSE</text>
  <text x="1145" y="392" class="tableh">DOCTOR</text>
  <text x="1305" y="392" class="tableh">CONFLICT</text>
  <text x="1395" y="392" class="tableh">NEXT ACTION</text>
  <text x="60" y="416" class="tablev">Sample Patient +1XXXXXXXX67</text>
  <text x="250" y="416" class="tablev">repeat</text>
  <text x="340" y="416" class="tablev">-</text>
  <text x="430" y="416" class="tablev">low</text>
  <text x="505" y="416" class="tablev">rescheduled</text>
  <text x="610" y="416" class="tablev">Sun, 08 Mar, 2026, 8:00 pm IST</text>
  <text x="840" y="416" class="tablev">pain in my neck, not able to sleep properly</text>
  <text x="1145" y="416" class="tablev">Dr. Kavya Rao (Psychiatry)</text>
  <text x="1305" y="416" class="tablev">yes</text>
  <text x="1395" y="416" class="tablev">human_review_conflict</text>

