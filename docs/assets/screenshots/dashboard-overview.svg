  <text x="60" y="498" class="panelSub">Pulled from Bolna via dashboard backend API</text>

  <text x="60" y="528" class="col">EXECUTION ID</text>
  <text x="240" y="528" class="col">STATUS</text>
  <text x="350" y="528" class="col">WORKFLOW</text>
