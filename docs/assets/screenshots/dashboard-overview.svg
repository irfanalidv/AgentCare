  <rect x="1024" y="726" width="550" height="330" class="card"/>
  <text x="1046" y="758" class="h">Appointments and Visit Details</text>
  <text x="1046" y="780" class="muted">Booked and pending scheduling, with doctor fit + visit purpose.</text>
  <rect x="1046" y="792" width="506" height="248" class="in"/>
  <text x="1058" y="812" class="tableh">APPOINTMENT</text>
  <text x="1145" y="812" class="tableh">STATUS</text>
