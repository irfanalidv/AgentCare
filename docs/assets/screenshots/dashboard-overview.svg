  <text x="730" y="592" class="cellMono">2026-03-06 19:12</text>

  <line x1="60" y1="604" x2="920" y2="604" class="row"/>

  <text x="60" y="624" class="cellMono">exec_c8e3b91a</text>
  <rect x="240" y="612" width="40" height="18" class="pillWarn"/>
  <text x="260" y="625" class="pillWarnText" text-anchor="middle">busy</text>
  <text x="350" y="624" class="cellMuted">frontdesk</text>
  <text x="510" y="624" class="cellMono">—</text>
  <text x="620" y="624" class="cellMono">0.00</text>
  <text x="730" y="624" class="cellMono">2026-03-06 20:01</text>

  <line x1="60" y1="636" x2="920" y2="636" class="row"/>

  <text x="60" y="656" class="cellMono">exec_d7a6f4c2</text>
  <rect x="240" y="644" width="64" height="18" class="pillSuccess"/>
  <text x="272" y="657" class="pillSuccessText" text-anchor="middle">completed</text>
  <text x="350" y="656" class="cellMuted">care_nav</text>
  <text x="510" y="656" class="cellMono">8.2s</text>
  <text x="620" y="656" class="cellMono">34.50</text>
  <text x="730" y="656" class="cellMono">2026-03-06 20:47</text>

  <line x1="60" y1="668" x2="920" y2="668" class="row"/>

  <text x="60" y="688" class="cellMono">exec_e2c9a5b8</text>
  <rect x="240" y="676" width="64" height="18" class="pillSuccess"/>
  <text x="272" y="689" class="pillSuccessText" text-anchor="middle">completed</text>
  <text x="350" y="688" class="cellMuted">followup</text>
  <text x="510" y="688" class="cellMono">9.0s</text>
  <text x="620" y="688" class="cellMono">37.33</text>
  <text x="730" y="688" class="cellMono">2026-03-06 20:02</text>

  <line x1="60" y1="700" x2="920" y2="700" class="row"/>

  <text x="60" y="720" class="cellMono">exec_f1b8d3e4</text>
  <rect x="240" y="708" width="64" height="18" class="pillSuccess"/>
  <text x="272" y="721" class="pillSuccessText" text-anchor="middle">completed</text>
  <text x="350" y="720" class="cellMuted">wellness</text>
  <text x="510" y="720" class="cellMono">6.5s</text>
  <text x="620" y="720" class="cellMono">38.55</text>
  <text x="730" y="720" class="cellMono">2026-03-06 19:38</text>

  <!-- Call Detail (right) -->
  <rect x="960" y="452" width="500" height="280" class="panel"/>
  <text x="980" y="480" class="panelTitle">Call Detail</text>
  <text x="980" y="498" class="panelSub">Click any row to inspect summaries</text>

  <text x="980" y="530" class="col">EXECUTION</text>
  <text x="980" y="552" class="cellMono">exec_f1b8d3e4</text>

  <text x="980" y="582" class="col">PATIENT-FACING SUMMARY</text>
  <rect x="980" y="590" width="460" height="56" class="input"/>
  <text x="996" y="612" class="cellMuted" font-size="11">Wellness check-in completed. Composite score 5.6</text>
  <text x="996" y="628" class="cellMuted" font-size="11">(medium band). Stressor: workload. Suggested manager</text>
  <text x="996" y="641" class="cellMuted" font-size="11">check-in within 72h.</text>

  <text x="980" y="668" class="col">INTERNAL OPS SUMMARY</text>
  <rect x="980" y="676" width="460" height="48" class="input"/>
  <text x="996" y="697" class="cellMuted" font-size="11">EE 6.5 · DP 5.4 · rPA 4.2 · 3 sessions trending up</text>
  <text x="996" y="713" class="cellMuted" font-size="11">(Mann-Kendall p=0.04). No acuity flag. Triage: false.</text>

  <!-- ============ Row 4: Wellness Cohort + Quick Stats ============ -->

  <!-- Wellness Cohort (left) -->
  <rect x="40" y="752" width="900" height="120" class="panel" stroke="#10b981" stroke-width="1.5"/>
  <text x="60" y="780" class="panelTitle">Wellness Cohort</text>
  <text x="60" y="798" class="panelSub">v0.2.0 · /api/wellness/cohort</text>
  <rect x="800" y="762" width="50" height="20" class="pillSuccess"/>
  <text x="825" y="776" class="pillSuccessText" text-anchor="middle" font-size="10">NEW</text>

  <text x="60" y="828" class="col">EMPLOYEES</text>
  <text x="60" y="852" font-size="22" font-weight="800" fill="#ffffff">12</text>

  <text x="180" y="828" class="col">FLAGGED</text>
  <text x="180" y="852" font-size="22" font-weight="800" fill="#f59e0b">3</text>

  <text x="300" y="828" class="col">HIGH BAND</text>
  <text x="300" y="852" font-size="22" font-weight="800" fill="#10b981">2</text>

  <text x="430" y="828" class="col">MEAN COMPOSITE</text>
  <text x="430" y="852" font-size="22" font-weight="800" fill="#ffffff">3.4</text>

  <text x="600" y="828" class="col">MEAN EE / DP / rPA</text>
