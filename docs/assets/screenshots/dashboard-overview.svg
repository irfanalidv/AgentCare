  <text x="620" y="560" class="cellMono">4.76</text>
  <text x="730" y="560" class="cellMono">2026-03-06 19:59</text>

  <line x1="60" y1="572" x2="920" y2="572" class="row"/>

  <text x="60" y="592" class="cellMono">exec_b4d2a8f1</text>
