  <text x="60" y="560" class="cellMono">exec_a1f9c2e7</text>
  <rect x="240" y="548" width="64" height="18" class="pillSuccess"/>
  <text x="272" y="561" class="pillSuccessText" text-anchor="middle">completed</text>
