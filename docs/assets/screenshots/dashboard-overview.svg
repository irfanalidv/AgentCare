  <text x="60" y="665" class="tablev">exec_b4d2a8f1</text><text x="370" y="665" class="tablev">completed</text><text x="450" y="665" class="tablev">+1XXXXXXXX67</text><text x="580" y="665" class="tablev">0.0</text><text x="670" y="665" class="tablev">4.490</text><text x="760" y="665" class="tablev">2026-03-06T19:12:20Z</text>
