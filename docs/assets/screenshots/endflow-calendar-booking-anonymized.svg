<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fc"/>
      <stop offset="100%" stop-color="#e9eef8"/>
    </linearGradient>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #102746; }
      .sub { font: 500 14px Arial, sans-serif; fill: #48648d; }
      .card { fill: #ffffff; stroke: #c8d5ea; stroke-width: 1.5; rx: 14; }
      .h { font: 700 18px Arial, sans-serif; fill: #1a3d6b; }
      .t { font: 500 14px Arial, sans-serif; fill: #334e73; }
      .muted { font: 500 13px Arial, sans-serif; fill: #647ea3; }
      .ok { fill: #1dbf73; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="40" y="54" class="title">Calendar Booking (Anonymized)</text>
  <text x="40" y="80" class="sub">End-of-flow preview: event created successfully with masked personal data.</text>

  <rect x="40" y="110" width="1320" height="610" class="card"/>
  <rect x="68" y="138" width="1264" height="62" class="card"/>
  <text x="92" y="176" class="h">30 min meeting between Patient A and Provider A</text>

  <text x="88" y="236" class="t">When</text>
  <text x="220" y="236" class="t">Mon 3/9/2026 9:30 PM - 10:00 PM (Asia/Kolkata)</text>

  <text x="88" y="272" class="t">Where</text>
  <text x="220" y="272" class="t">Cal Video - https://app.cal.com/video/meeting-id-redacted</text>

  <text x="88" y="308" class="t">Organizer</text>
  <text x="220" y="308" class="t">organizer@masked-domain.com</text>

  <text x="88" y="344" class="t">Guest</text>
  <text x="220" y="344" class="t">patient@masked-domain.com • +1XXXXXXXX67</text>

  <text x="88" y="396" class="h">Additional notes</text>
  <text x="88" y="426" class="t">Reason: neck pain and poor sleep</text>
  <text x="88" y="454" class="t">Visit type: new</text>
  <text x="88" y="482" class="t">Assigned doctor: Dr. Assigned (Orthopedics)</text>

  <circle cx="1270" cy="168" r="12" class="ok"/>
  <text x="1292" y="173" class="muted">Scheduled</text>

  <text x="88" y="690" class="muted">This asset is intentionally anonymized for documentation and sharing.</text>
</svg>
