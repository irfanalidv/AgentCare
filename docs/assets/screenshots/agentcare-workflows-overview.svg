<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" font-family="-apple-system, 'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <style>
      .h1 { font-size: 44px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }
      .tag { font-size: 17px; fill: #6b7d99; font-weight: 400; }
      .stage { fill: #0f2233; stroke: #10b981; stroke-width: 2; rx: 14; }
      .stageNum { font-size: 13px; font-weight: 700; fill: #10b981; }
      .stageTitle { font-size: 17px; font-weight: 700; fill: #ffffff; }
      .stageDesc { font-size: 12px; fill: #b8d4f0; }
      .arrow { stroke: #10b981; stroke-width: 2.5; fill: none; }
      .arrowSoft { stroke: #2a4660; stroke-width: 1.5; fill: none; stroke-dasharray: 4,4; }
      .col { font-size: 22px; font-weight: 700; fill: #ffffff; }
      .wf { fill: #0f2233; stroke: #1f3850; stroke-width: 1.5; rx: 14; }
      .wfHi { fill: #0f2233; stroke: #10b981; stroke-width: 2; rx: 14; }
      .wfTitle { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .wfBadge { font-size: 11px; font-weight: 700; fill: #6b7d99; letter-spacing: 1px; }
      .wfBadgeNew { font-size: 11px; font-weight: 700; fill: #10b981; letter-spacing: 1px; }
      .wfDesc { font-size: 13px; fill: #b8d4f0; }
      .wfPath { font-size: 11px; fill: #6b7d99; font-family: 'SF Mono', Monaco, Consolas, monospace; }
      .accent { fill: url(#accentGrad); rx: 14; }
      .accentText { font-size: 17px; fill: #ffffff; font-weight: 700; }
    </style>
  </defs>

  <rect width="1500" height="820" fill="url(#bg)"/>

  <text x="50" y="62" class="h1">AgentCare Workflows</text>
  <text x="50" y="92" class="tag">Four registered workflows share one voice-AI pipeline; each plugs in its own analysis, policy, and action</text>

  <!-- ====== Pipeline strip across the top ====== -->
  <text x="50" y="148" class="col">Shared Pipeline</text>

  <!-- Stage 1: Ingestion -->
  <rect x="50" y="168" width="270" height="100" class="stage"/>
  <text x="70" y="195" class="stageNum">STAGE 1</text>
  <text x="70" y="220" class="stageTitle">Call Ingestion</text>
  <text x="70" y="240" class="stageDesc">Bolna · Deepgram · Mistral</text>
  <text x="70" y="258" class="stageDesc">FastAPI webhook</text>

  <line x1="320" y1="218" x2="358" y2="218" class="arrow"/>
  <polygon points="358,218 350,214 350,222" fill="#10b981"/>

  <!-- Stage 2: Extraction -->
  <rect x="358" y="168" width="260" height="100" class="stage"/>
  <text x="378" y="195" class="stageNum">STAGE 2</text>
  <text x="378" y="220" class="stageTitle">Extraction</text>
  <text x="378" y="240" class="stageDesc">Regex layer (deterministic)</text>
  <text x="378" y="258" class="stageDesc">LLM extractor (Pydantic JSON)</text>

  <line x1="618" y1="218" x2="656" y2="218" class="arrow"/>
  <polygon points="656,218 648,214 648,222" fill="#10b981"/>

  <!-- Stage 3: Analysis -->
  <rect x="656" y="168" width="260" height="100" class="stage"/>
  <text x="676" y="195" class="stageNum">STAGE 3</text>
  <text x="676" y="220" class="stageTitle">Analysis</text>
  <text x="676" y="240" class="stageDesc">Healthcare risk · Burnout MBI</text>
  <text x="676" y="258" class="stageDesc">Trend detection (Mann–Kendall)</text>

  <line x1="916" y1="218" x2="954" y2="218" class="arrow"/>
  <polygon points="954,218 946,214 946,222" fill="#10b981"/>

  <!-- Stage 4: Policy -->
  <rect x="954" y="168" width="260" height="100" class="accent"/>
  <text x="974" y="220" font-size="17" font-weight="700" fill="#ffffff">Policy &amp; Routing</text>
  <text x="974" y="240" font-size="13" fill="#dcfce7">Frontdesk · Wellness</text>
  <text x="974" y="258" font-size="13" fill="#dcfce7">Triage / auto-action / escalate</text>

  <line x1="1214" y1="218" x2="1252" y2="218" class="arrow"/>
  <polygon points="1252,218 1244,214 1244,222" fill="#10b981"/>

  <!-- Stage 5: Action -->
  <rect x="1252" y="168" width="200" height="100" class="stage"/>
  <text x="1272" y="195" class="stageNum">STAGE 5</text>
  <text x="1272" y="220" class="stageTitle">Action</text>
  <text x="1272" y="240" class="stageDesc">Cal · Email · Memory</text>
  <text x="1272" y="258" class="stageDesc">Triage queue</text>

  <!-- ====== Registered Workflows ====== -->
  <text x="50" y="340" class="col">Registered Workflows</text>

  <!-- Connector lines from policy to workflows -->
  <path d="M 1084 270 C 1084 295, 200 295, 200 380" class="arrowSoft"/>
  <path d="M 1084 270 C 1084 295, 510 295, 510 380" class="arrowSoft"/>
  <path d="M 1084 270 C 1084 295, 820 295, 820 380" class="arrowSoft"/>
  <path d="M 1084 270 L 1130 380" class="arrowSoft"/>

  <!-- frontdesk_booking -->
  <rect x="50" y="380" width="340" height="200" class="wf"/>
  <text x="70" y="412" class="wfTitle">frontdesk_booking</text>
  <text x="70" y="432" class="wfBadge">HEALTHCARE · SCHEDULING</text>
  <text x="70" y="462" class="wfDesc">Inbound call → extract intent →</text>
  <text x="70" y="480" class="wfDesc">assign doctor → check Cal slot →</text>
  <text x="70" y="498" class="wfDesc">book appointment → confirm by</text>
  <text x="70" y="516" class="wfDesc">email → persist lifecycle.</text>
  <text x="70" y="556" class="wfPath">usecases/frontdesk.py</text>

  <!-- care_navigation -->
  <rect x="410" y="380" width="340" height="200" class="wf"/>
  <text x="430" y="412" class="wfTitle">care_navigation</text>
  <text x="430" y="432" class="wfBadge">HEALTHCARE · COORDINATION</text>
  <text x="430" y="462" class="wfDesc">Long-form patient intake with</text>
  <text x="430" y="480" class="wfDesc">specialty routing and care-team</text>
  <text x="430" y="498" class="wfDesc">coordination handoff. Tool-friendly,</text>
  <text x="430" y="516" class="wfDesc">booking-light.</text>
  <text x="430" y="556" class="wfPath">workflows/registry.py</text>

  <!-- followup_outreach -->
  <rect x="770" y="380" width="340" height="200" class="wf"/>
  <text x="790" y="412" class="wfTitle">followup_outreach</text>
  <text x="790" y="432" class="wfBadge">HEALTHCARE · OUTREACH</text>
  <text x="790" y="462" class="wfDesc">Outbound follow-up to confirm</text>
  <text x="790" y="480" class="wfDesc">post-visit status and surface</text>
  <text x="790" y="498" class="wfDesc">re-engagement signals for</text>
  <text x="790" y="516" class="wfDesc">unresolved cases.</text>
  <text x="790" y="556" class="wfPath">workflows/registry.py</text>

  <!-- wellness_checkin (highlighted) -->
  <rect x="1130" y="380" width="320" height="200" class="wfHi"/>
  <text x="1150" y="412" class="wfTitle">wellness_checkin</text>
  <text x="1150" y="432" class="wfBadgeNew">WORKPLACE WELLNESS · NEW</text>
  <text x="1150" y="462" class="wfDesc">Weekly burnout check-in →</text>
  <text x="1150" y="480" class="wfDesc">MBI dimension scoring →</text>
  <text x="1150" y="498" class="wfDesc">trend detection → triage</text>
  <text x="1150" y="516" class="wfDesc">routing or auto-close.</text>
  <text x="1150" y="556" class="wfPath">usecases/wellness.py</text>

  <!-- ====== Wellness Detail (5 module cards across bottom) ====== -->
  <text x="50" y="640" class="col">Wellness Workflow Modules</text>

  <rect x="50" y="660" width="270" height="130" class="wf"/>
  <text x="70" y="688" class="wfTitle" font-size="15">Burnout Analysis</text>
  <text x="70" y="710" class="wfDesc" font-size="12">MBI regex taxonomy:</text>
  <text x="70" y="726" class="wfDesc" font-size="12">EE · DP · rPA · crisis acuity</text>
  <text x="70" y="742" class="wfDesc" font-size="12">Saturating composite scoring</text>
  <text x="70" y="775" class="wfPath">analysis/burnout.py</text>

  <rect x="334" y="660" width="270" height="130" class="wf"/>
  <text x="354" y="688" class="wfTitle" font-size="15">LLM Extraction</text>
  <text x="354" y="710" class="wfDesc" font-size="12">Mistral, temperature 0.0</text>
  <text x="354" y="726" class="wfDesc" font-size="12">Pydantic-validated JSON</text>
  <text x="354" y="742" class="wfDesc" font-size="12">0–10 dimensions + evidence</text>
  <text x="354" y="775" class="wfPath">extraction/burnout.py</text>

  <rect x="618" y="660" width="270" height="130" class="wf"/>
  <text x="638" y="688" class="wfTitle" font-size="15">Trend Detection</text>
  <text x="638" y="710" class="wfDesc" font-size="12">Mann–Kendall (tie-corrected)</text>
  <text x="638" y="726" class="wfDesc" font-size="12">+ OLS slope + tail-run check</text>
  <text x="638" y="742" class="wfDesc" font-size="12">Triage trigger logic</text>
  <text x="638" y="775" class="wfPath">analysis/trend.py</text>

  <rect x="902" y="660" width="270" height="130" class="wf"/>
  <text x="922" y="688" class="wfTitle" font-size="15">Wellness Policy</text>
  <text x="922" y="710" class="wfDesc" font-size="12">Crisis → human (immediate)</text>
  <text x="922" y="726" class="wfDesc" font-size="12">High / triage → human</text>
  <text x="922" y="742" class="wfDesc" font-size="12">Med / declining → manager</text>
  <text x="922" y="775" class="wfPath">policies/wellness.py</text>

  <rect x="1186" y="660" width="264" height="130" class="wf"/>
  <text x="1206" y="688" class="wfTitle" font-size="15">History Store</text>
  <text x="1206" y="710" class="wfDesc" font-size="12">Per-employee score series</text>
  <text x="1206" y="726" class="wfDesc" font-size="12">JSON / Postgres backends</text>
  <text x="1206" y="742" class="wfDesc" font-size="12">Surfaces in /api/wellness/*</text>
  <text x="1206" y="775" class="wfPath">wellness/store.py</text>

</svg>
